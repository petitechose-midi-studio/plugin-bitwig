name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bitwig_release:
    name: bitwig (workspace release + extension)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout ms-dev-env
        uses: actions/checkout@v4
        with:
          repository: petitechose-midi-studio/ms-dev-env
          ref: main
          path: workspace

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync Python deps
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          uv sync --frozen --extra dev

      - name: Sync workspace repos
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          uv run ms sync --repos

      - name: Checkout plugin-bitwig under test
        uses: actions/checkout@v4
        with:
          path: workspace/midi-studio/plugin-bitwig

      - name: Sync workspace tools
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          uv run ms sync --tools

      - name: Verify release BOM
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          uv run ms release verify-bom

      - name: Build bitwig firmware (release)
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          uv run ms build bitwig --target teensy --env release

      - name: Build bitwig extension
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          uv run ms build bitwig --target extension --extensions-dir _bitwig_extensions
