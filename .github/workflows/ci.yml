name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bitwig_release:
    name: bitwig (workspace release + extension)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout plugin-bitwig under test
        uses: actions/checkout@v6
        with:
          path: plugin-bitwig-under-test

      - name: Resolve tracked tooling SHA
        id: tooling
        shell: bash
        run: |
          set -euo pipefail
          tooling_sha="$(python -c 'import json; from pathlib import Path; print(json.loads(Path("plugin-bitwig-under-test/.github/release-tooling.json").read_text(encoding="utf-8"))["sha"])')"
          if ! [[ "$tooling_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid tooling SHA: $tooling_sha" >&2
            exit 1
          fi
          echo "tooling_sha=$tooling_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout ms-dev-env
        uses: actions/checkout@v6
        with:
          repository: petitechose-midi-studio/ms-dev-env
          ref: ${{ steps.tooling.outputs.tooling_sha }}
          path: workspace

      - name: Validate tooling checkout
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git -C workspace rev-parse HEAD)"
          if [ "$sha" != "${{ steps.tooling.outputs.tooling_sha }}" ]; then
            echo "Checked out tooling SHA does not match tracked tooling SHA" >&2
            echo "tracked=${{ steps.tooling.outputs.tooling_sha }}" >&2
            echo "head=$sha" >&2
            exit 1
          fi

      - name: Setup ms runtime
        uses: ./workspace/.github/actions/setup-ms-runtime
        with:
          working-directory: workspace

      - name: Sync workspace repos
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          uv run ms sync --repos

      - name: Inject plugin-bitwig under test
        shell: bash
        run: |
          set -euo pipefail
          rm -rf workspace/midi-studio/plugin-bitwig
          mv plugin-bitwig-under-test workspace/midi-studio/plugin-bitwig

      - name: Sync workspace tools
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          uv run ms sync --tools

      - name: Verify release BOM
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          uv run ms release verify-bom

      - name: Build bitwig firmware (release)
        if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          uv run ms build bitwig --target teensy --env release

      - name: Build bitwig extension
        if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          uv run ms build bitwig --target extension --extensions-dir _bitwig_extensions
